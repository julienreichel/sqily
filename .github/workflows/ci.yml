name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: sqily_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sqily_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/sqily_test
      RAILS_MASTER_KEY: dummy
      AWS_BUCKET_URL: http://minioadmin:minioadmin@127.0.0.1:9000/sqily-test?region=us-east-1&path_style=true
      AWS_BUCKET_PREFIX: test
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev imagemagick libmagickwand-dev pkg-config

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Start MinIO
        run: |
          docker run -d --rm \
            --name sqily-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Create MinIO test bucket
        run: |
          bundle exec ruby -e '
            require "aws-sdk-s3"
            s3 = Aws::S3::Client.new(
              access_key_id: ENV.fetch("AWS_ACCESS_KEY_ID"),
              secret_access_key: ENV.fetch("AWS_SECRET_ACCESS_KEY"),
              region: ENV.fetch("AWS_DEFAULT_REGION"),
              endpoint: "http://127.0.0.1:9000",
              force_path_style: true
            )

            begin
              s3.create_bucket(bucket: "sqily-test")
            rescue Aws::S3::Errors::BucketAlreadyOwnedByYou, Aws::S3::Errors::BucketAlreadyExists
            end
          '

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run test suite
        run: bin/rails test
